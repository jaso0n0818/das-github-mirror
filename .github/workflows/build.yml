name: Build

on:
  pull_request:
    branches: [main, test]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/das

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: packages/das/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build
